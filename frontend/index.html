<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Personal Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI Personal Assistant</h1>
            <p id="status" class="status">Connecting...</p>
        </header>

        <div class="panels">
            <section class="panel chat-panel">
                <h2>💬 Chat</h2>
                <div id="chat-log" class="chat-log"></div>
                <form id="chat-form" class="input-form">
                    <input type="text" id="chat-input" placeholder="Ask me anything or manage tasks/notes..." required>
                    <button type="submit">Send</button>
                </form>
            </section>

            <section class="panel tasks-panel">
                <h2>✓ Tasks</h2>
                <form id="task-form" class="input-form">
                    <input type="text" id="task-input" placeholder="Add a new task..." required>
                    <button type="submit">Add</button>
                </form>
                <ul id="task-list" class="item-list"></ul>
            </section>

            <section class="panel notes-panel">
                <h2>📝 Notes</h2>
                <form id="note-form" class="input-form">
                    <input type="text" id="note-title" placeholder="Note title..." required>
                    <textarea id="note-content" placeholder="Note content..." required></textarea>
                    <button type="submit">Add</button>
                </form>
                <ul id="note-list" class="item-list"></ul>
            </section>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
